<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Bio-Maze 3D: Dynamic Escape</title>
    <style>
        :root { --blood: #cc0000; --gold: #ffd700; --safe: #44ff44; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* 狀態列 */
        #hud {
            position: absolute; top: 0; width: 100%; display: flex;
            justify-content: space-around; padding: 20px; background: rgba(0,0,0,0.6);
            border-bottom: 2px solid var(--blood); z-index: 10;
        }
        .stat b { display: block; color: var(--gold); font-size: 1.4em; }

        /* 3D 舞台 */
        #viewport { position: relative; width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; }

        /* 互動層 */
        #ui-overlay {
            position: absolute; bottom: 10%; width: 100%; display: flex;
            flex-direction: column; align-items: center; z-index: 20;
        }
        #question-box {
            background: rgba(20,0,0,0.85); padding: 20px; border-radius: 15px;
            border: 1px solid var(--blood); max-width: 600px; text-align: center;
            margin-bottom: 20px; transition: 0.3s;
        }
        .options { display: flex; gap: 15px; }
        button {
            padding: 15px 25px; background: #222; color: white; border: 2px solid var(--gold);
            cursor: pointer; border-radius: 8px; font-size: 1em; transition: 0.2s;
        }
        button:hover { background: var(--gold); color: #000; transform: translateY(-5px); }
        
        /* 訊息提示 */
        #alert {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3em; font-weight: bold; pointer-events: none; opacity: 0;
            text-shadow: 0 0 20px #000; z-index: 30;
        }

        /* 撞牆動畫 */
        .impact { animation: impact-shake 0.5s ease-out; }
        @keyframes impact-shake {
            0% { transform: scale(1); filter: brightness(1); }
            20% { transform: scale(1.1) translate(10px, -10px); filter: brightness(2) sepia(1) saturate(5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
    </style>
</head>
<body>

<div id="hud">
    <div class="stat">🧬 細胞活性 <b id="stamina">100</b></div>
    <div class="stat">👣 逃生進度 <b id="progress">0 / 20</b></div>
</div>

<div id="viewport">
    <canvas id="mazeCanvas"></canvas>
    <div id="alert">撞牆！</div>
    <div id="ui-overlay">
        <div id="question-box">
            <h3 id="q-text">準備進入迷宮...</h3>
        </div>
        <div class="options" id="opt-container">
            <button onclick="startGame()">開始探索</button>
        </div>
    </div>
</div>

<script>
    // 題庫與狀態 (整合 100 題邏輯)
    const questions = [
        { q: "突然感到頭暈、冒冷汗、手抖，可能是？", a: ["低血糖", "高血壓", "脫水"], c: 0 },
        { q: "中暑的第一步處理？", a: ["喝冰水", "移至陰涼處", "吃退燒藥"], c: 1 },
        { q: "燒燙傷處理首要？", a: ["塗牙膏", "沖冷水 20 分", "冰敷"], c: 1 },
        { q: "最大心跳率公式？", a: ["220-年齡", "100+年齡", "180-體重"], c: 0 }
        // ...其餘 100 題
    ];

    let state = {
        hp: 100, step: 0, target: 20,
        z: 0, currentZ: 0, 
        isMoving: false, pulse: 0
    };

    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 3D 渲染核心：模擬前行與路口
    function render() {
        ctx.fillStyle = '#050000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const w = canvas.width;
        const h = canvas.height;
        const centerX = w / 2;
        const centerY = h / 2;

        // 平滑移動計算
        state.currentZ += (state.z - state.currentZ) * 0.08;
        state.pulse += 0.02;
        const pulseEffect = Math.sin(state.pulse) * 5;

        // 繪製透視牆面
        for (let i = 8; i > 0; i--) {
            const pos = (i * 200) - (state.currentZ % 200);
            const size = (h / (pos / 400));
            const alpha = 1 - (pos / 1600);

            ctx.strokeStyle = `rgba(200, 0, 0, ${alpha})`;
            ctx.lineWidth = 2;
            
            // 繪製方框路徑
            ctx.strokeRect(centerX - size/2, centerY - size/2 + pulseEffect, size, size);
            
            // 繪製連接線（血管紋路感）
            ctx.beginPath();
            ctx.moveTo(centerX - size/2, centerY - size/2 + pulseEffect);
            ctx.lineTo(0, 0);
            ctx.moveTo(centerX + size/2, centerY - size/2 + pulseEffect);
            ctx.lineTo(w, 0);
            ctx.stroke();
        }

        requestAnimationFrame(render);
    }

    function startGame() {
        state.hp = 100;
        state.step = 0;
        updateHUD();
        render();
        loadQuestion();
    }

    function loadQuestion() {
        const qData = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('q-text').innerText = qData.q;
        const container = document.getElementById('opt-container');
        container.innerHTML = '';

        qData.a.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.innerText = text;
            btn.onclick = () => check(i, qData.c, qData.a[qData.c]);
            container.appendChild(btn);
        });
    }

    function check(idx, correct, correctText) {
        if (state.isMoving) return;

        if (idx === correct) {
            // 答對：動態前行
            state.isMoving = true;
            state.z += 600; // 推進視覺
            state.step++;
            
            setTimeout(() => {
                state.isMoving = false;
                updateHUD();
                if (state.step >= state.target) {
                    victory();
                } else {
                    loadQuestion();
                }
            }, 800);
        } else {
            // 答錯：撞牆震動
            state.hp -= 20;
            const alertEl = document.getElementById('alert');
            const view = document.getElementById('viewport');
            
            view.classList.add('impact');
            alertEl.style.opacity = '1';
            alertEl.innerHTML = `💥 撞牆！<br><span style="font-size:0.4em">正確路徑：${correctText}</span>`;
            
            setTimeout(() => {
                view.classList.remove('impact');
                alertEl.style.opacity = '0';
                updateHUD();
                if (state.hp <= 0) {
                    gameOver();
                } else {
                    loadQuestion();
                }
            }, 1500);
        }
    }

    function updateHUD() {
        document.getElementById('stamina').innerText = state.hp;
        document.getElementById('progress').innerText = `${state.step} / ${state.target}`;
    }

    function victory() {
        document.getElementById('q-text').innerText = "🎉 成功逃生！你已抵達身體出口。";
        document.getElementById('opt-container').innerHTML = '<button onclick="location.reload()">重新挑戰</button>';
    }

    function gameOver() {
        document.getElementById('q-text').innerText = "💀 細胞凋亡... 體力耗盡。";
        document.getElementById('opt-container').innerHTML = '<button onclick="location.reload()">重新啟動</button>';
    }
</script>
</body>
</html>
